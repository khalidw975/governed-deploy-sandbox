# Representational manifest for the pilot app (the live cluster is driven by the demo).
apiVersion: apps/v1
kind: Deployment
metadata: { name: customer-portal, labels: { app: customer-portal, tier: non-payments } }
spec:
  replicas: 2
  selector: { matchLabels: { app: customer-portal } }
  template:
    metadata: { labels: { app: customer-portal } }
    spec:
      containers:
        - name: customer-portal
          image: nginx:1.27-alpine
          ports: [ { containerPort: 80 } ]
