name: policy-gate
on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
permissions: { contents: read, pull-requests: read }
jobs:
  policy-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Install conftest
        run: |
          v=0.56.0
          curl -sSL "https://github.com/open-policy-agent/conftest/releases/download/v${v}/conftest_${v}_Linux_x86_64.tar.gz" | tar -xz conftest
          sudo install conftest /usr/local/bin/conftest
      - name: Build change.json from PR diff + labels
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BASE="origin/${{ github.base_ref }}"
          CHANGED=$(git diff --name-only "$BASE"...HEAD | jq -R -s 'split("\n") | map(select(length>0))')
          LABELS=$(gh pr view ${{ github.event.number }} --json labels -q '[.labels[].name]')
          jq -n --argjson paths "$CHANGED" --argjson labels "$LABELS" \
            '{id:"PR-${{ github.event.number }}",paths:$paths,labels:$labels}' > change.json
          echo "::group::change.json"; cat change.json; echo "::endgroup::"
      - name: Run the governed-augmentation policy gate
        run: conftest test change.json -p policy/
